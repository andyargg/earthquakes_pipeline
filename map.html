<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sismos</title>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
    #stats {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px 14px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }
    #controles {
      position: absolute;
      top: 90px;
      left: 12px;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px 14px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 13px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      width: 220px;
    }
    #controles label {
      display: block;
      margin-top: 6px;
    }
    #controles input[type="range"] {
      width: 100%;
    }
    #continentes {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #ccc;
      max-height: 260px;
      overflow-y: auto;
    }
    #continentes label {
      display: block;
      margin-top: 0;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="stats">cargando...</div>
  <div id="controles">
    <label>Desde: <span id="yearMinLabel"></span></label>
    <input type="range" id="yearMin">
    <label>Hasta: <span id="yearMaxLabel"></span></label>
    <input type="range" id="yearMax">
    <label>Magnitud desde: <span id="magMinLabel"></span></label>
    <input type="range" id="magMin" step="0.1">
    <label>Magnitud hasta: <span id="magMaxLabel"></span></label>
    <input type="range" id="magMax" step="0.1">
    <div id="continentes"></div>
  </div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://demotiles.maplibre.org/style.json',
      center: [0, 20],
      zoom: 1
    });

    let deckOverlay;
    let todosLosSismos = [];

    // Continentes fijos (Natural Earth) en vez de derivarlos de los datos:
    // ya no tenemos el dataset completo en el navegador para inspeccionarlo,
    // porque ahora se pide filtrado al endpoint en vez de una vez entero.
    const CONTINENTES = [
      'Africa', 'Antarctica', 'Asia', 'Europe', 'North America',
      'Oceania', 'South America', 'Océano'
    ];

    function capaSismos(features) {
      // Radio y color dependen de la magnitud de cada sismo (accessors por
      // dato) - algo que MapLibre puede hacer con expressions pero deck.gl
      // resuelve de forma más directa, y escala mejor con datasets grandes.
      return new deck.GeoJsonLayer({
        id: 'earthquakes-deck',
        data: { type: 'FeatureCollection', features },
        pointType: 'circle',
        pointRadiusUnits: 'pixels',
        getPointRadius: d => Math.max(d.properties.mag - 3, 0.5) * 2,
        pointRadiusMinPixels: 2,
        pointRadiusMaxPixels: 14,
        getFillColor: d => {
          const mag = d.properties.mag;
          if (mag >= 5) return [180, 0, 0, 200];
          if (mag >= 3) return [255, 100, 0, 200];
          return [255, 200, 0, 180];
        },
        pickable: true,
        autoHighlight: true
      });
    }

    function continenteDe(f) {
      return f.properties.continente || 'Océano';
    }

    function actualizarVista() {
      const activos = Array.from(document.querySelectorAll('.cont-check:checked'))
        .map(el => el.value);

      const filtrados = todosLosSismos.filter(f => activos.includes(continenteDe(f)));

      deckOverlay.setProps({ layers: [capaSismos(filtrados)] });

      const total = filtrados.length;
      const enTierra = filtrados.filter(f => f.properties.en_tierra).length;
      const enMar = total - enTierra;
      const desde = document.getElementById('yearMin').value;
      const hasta = document.getElementById('yearMax').value;
      document.getElementById('stats').innerHTML =
        `<b>${total}</b> sismos (${desde}-${hasta})<br>` +
        `${enTierra} en tierra &middot; ${enMar} en mar`;
    }

    function cargarDatos() {
      const yearMin = document.getElementById('yearMin').value;
      const yearMax = document.getElementById('yearMax').value;
      const magMin = document.getElementById('magMin').value;
      const magMax = document.getElementById('magMax').value;

      document.getElementById('stats').innerHTML = 'cargando...';

      const url = `/api/earthquakes?year_min=${yearMin}&year_max=${yearMax}`
        + `&mag_min=${magMin}&mag_max=${magMax}`;

      fetch(url)
        .then(res => res.json())
        .then(data => {
          todosLosSismos = data.features;
          actualizarVista();
        });
    }

    map.on('load', () => {
      const yearMin = document.getElementById('yearMin');
      const yearMax = document.getElementById('yearMax');
      const magMin = document.getElementById('magMin');
      const magMax = document.getElementById('magMax');

      // Rango conocido del dataset (ver ingest_earthquakes.py: últimos 10
      // años, magnitud mínima 4.0). Arranca mostrando solo los últimos 2
      // años, para que la primera carga sea liviana.
      const anioActual = new Date().getFullYear();
      yearMin.min = yearMax.min = 2015;
      yearMin.max = yearMax.max = anioActual;
      yearMin.value = anioActual - 2;
      yearMax.value = anioActual;
      document.getElementById('yearMinLabel').textContent = yearMin.value;
      document.getElementById('yearMaxLabel').textContent = yearMax.value;

      magMin.min = magMax.min = 4;
      magMin.max = magMax.max = 9.5;
      magMin.value = 4;
      magMax.value = 9.5;
      document.getElementById('magMinLabel').textContent = '4.0';
      document.getElementById('magMaxLabel').textContent = '9.5';

      // Checkboxes de continente: arrancan destildados, el mapa entra vacío
      // hasta que el usuario elige qué continentes quiere ver. No hace falta
      // refetch al tildar/destildar, es un filtro puramente local.
      const contDiv = document.getElementById('continentes');
      contDiv.innerHTML = CONTINENTES.map(c => `
        <label><input type="checkbox" class="cont-check" value="${c}"> ${c}</label>
      `).join('');
      contDiv.addEventListener('change', actualizarVista);

      deckOverlay = new deck.MapboxOverlay({
        interleaved: true,
        layers: [],
        getTooltip: ({ object }) => object && {
          html: `<b>${object.properties.place}</b><br/>Magnitud: ${object.properties.mag}`
        }
      });
      map.addControl(deckOverlay);

      cargarDatos();

      // 'input' actualiza el número mientras arrastrás; 'change' (cuando
      // soltás) es lo que dispara el pedido al servidor - si pidiéramos en
      // cada 'input' bombardeamos la API mientras arrastrás el slider.
      yearMin.addEventListener('input', () => {
        document.getElementById('yearMinLabel').textContent = yearMin.value;
      });
      yearMax.addEventListener('input', () => {
        document.getElementById('yearMaxLabel').textContent = yearMax.value;
      });
      yearMin.addEventListener('change', () => {
        if (parseInt(yearMin.value) > parseInt(yearMax.value)) yearMax.value = yearMin.value;
        cargarDatos();
      });
      yearMax.addEventListener('change', () => {
        if (parseInt(yearMax.value) < parseInt(yearMin.value)) yearMin.value = yearMax.value;
        cargarDatos();
      });

      magMin.addEventListener('input', () => {
        document.getElementById('magMinLabel').textContent = parseFloat(magMin.value).toFixed(1);
      });
      magMax.addEventListener('input', () => {
        document.getElementById('magMaxLabel').textContent = parseFloat(magMax.value).toFixed(1);
      });
      magMin.addEventListener('change', () => {
        if (parseFloat(magMin.value) > parseFloat(magMax.value)) magMax.value = magMin.value;
        cargarDatos();
      });
      magMax.addEventListener('change', () => {
        if (parseFloat(magMax.value) < parseFloat(magMin.value)) magMin.value = magMax.value;
        cargarDatos();
      });

      // Oculta la etiqueta base "Falkland Islands" del estilo demotiles
      // (viene de un tileset externo que no controlamos) y la reemplaza
      // por un label propio con el nombre correcto.
      map.setFilter('countries-label', [
        'all',
        ['!', ['any',
          ['==', ['get', 'NAME'], 'Falkland Islands'],
          ['==', ['get', 'NAME'], 'Falkland Is.'],
          ['==', ['get', 'ABBREV'], 'Falk.'],
          ['==', ['get', 'ISO_A2'], 'FK'],
          ['==', ['get', 'ISO_A3'], 'FLK']
        ]]
      ]);

      map.addSource('malvinas-label', {
        type: 'geojson',
        data: {
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [-59.5, -51.75] },
            properties: { name: 'Islas Malvinas' }
          }]
        }
      });

      map.addLayer({
        id: 'malvinas-label',
        type: 'symbol',
        source: 'malvinas-label',
        layout: {
          'text-field': ['get', 'name'],
          'text-size': 12,
          'text-font': ['Open Sans Semibold']
        },
        paint: {
          'text-color': '#000000',
          'text-halo-color': '#ffffff',
          'text-halo-width': 1
        }
      });
    });
  </script>
</body>
</html>
